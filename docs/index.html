<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Image Converter</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; line-height: 1.6; color: #333; max-width: 800px; margin: 0 auto; padding: 2rem; background-color: #f9fafb; }
        header { text-align: center; padding: 3rem 0; background-color: #ffffff; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 2rem; }
        h1 { color: #2563eb; margin-bottom: 0.5rem; }
        p { margin-bottom: 1rem; }
        .tags { display: flex; justify-content: center; gap: 0.5rem; flex-wrap: wrap; margin-top: 1rem; }
        .tag { background-color: #e0e7ff; color: #4f46e5; padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.875rem; font-weight: 500; }
        .section-card { background-color: #ffffff; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 2rem; }
        .form-group { margin-bottom: 1.5rem; }
        label.input-label { display: block; margin-bottom: 0.5rem; font-weight: 600; }
        .custom-file-upload { display: flex; align-items: center; gap: 1rem; }
        input[type="file"] { display: none; }
        .custom-file-btn {
            background-color: #f3f4f6; color: #374151; border: 1px solid #d1d5db;
            padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; font-weight: 500;
        }
        .custom-file-btn:hover { background-color: #e5e7eb; }
        .file-status-text { color: #6b7280; font-size: 0.9rem; }
        select { padding: 0.5rem; border: 1px solid #d1d5db; border-radius: 4px; width: 100%; max-width: 300px; }
        button { background-color: #2563eb; color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 4px; font-weight: 600; cursor: pointer; font-size: 1rem; }
        button:hover { background-color: #1d4ed8; }
        button:disabled { background-color: #93c5fd; cursor: not-allowed; }
        #status { margin-top: 1rem; font-weight: 600; color: #4b5563; }
        #download-link { display: none; margin-top: 1rem; font-weight: bold; color: #10b981; }

        #preview-container {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .thumbnail-wrapper {
            position: relative;
            width: 100px;
            height: 100px;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f3f4f6;
        }
        .thumbnail-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: cover;
        }
        .thumbnail-name {
            font-size: 0.65rem;
            text-align: center;
            padding: 0.25rem;
            word-break: break-all;
        }
        .remove-btn {
            position: absolute;
            top: 2px;
            right: 2px;
            background-color: rgba(239, 68, 68, 0.9);
            color: white;
            border: none;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 12px;
            line-height: 1;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }
        .remove-btn:hover {
            background-color: rgb(220, 38, 38);
        }
    </style>
    <!-- Load JSZip for batch archiving -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <!-- Load ESM from esm.sh to automatically handle CJS conversion -->
    <script type="importmap">
    {
      "imports": {
        "@imagemagick/magick-wasm": "https://esm.sh/@imagemagick/magick-wasm@0.0.30"
      }
    }
    </script>
</head>
<body>
    <header>
        <h1>Universal Image Converter (Web)</h1>
        <p>A powerful in-browser application for converting 50+ image and metadata formats entirely client-side.</p>
        <div class="tags">
            <span class="tag">webassembly</span>
            <span class="tag">imagemagick</span>
            <span class="tag">exif</span>
            <span class="tag">heic</span>
            <span class="tag">raw-converter</span>
        </div>
    </header>

    <div class="section-card">
        <h2>Online Converter</h2>
        <div class="form-group">
            <label class="input-label">Select Image Files (Supports JPG, PNG, RAW, HEIC, EXIF, etc. Single or Batch)</label>
            <div class="custom-file-upload">
                <label for="fileInput" class="custom-file-btn">Choose Files</label>
                <input type="file" id="fileInput" accept="*/*" multiple>
                <span id="fileStatusText" class="file-status-text">No file chosen</span>
            </div>
        </div>

        <div id="preview-container"></div>

        <div class="form-group">
            <label for="targetFormat">Target Format</label>
            <select id="targetFormat">
                <option value="loading">Loading formats...</option>
            </select>
        </div>

        <button id="convertBtn" disabled>Initializing Engine...</button>

        <div id="status"></div>
        <div id="downloads-container" style="margin-top: 1rem; display: flex; flex-direction: column; gap: 0.5rem;"></div>
    </div>

    <script type="module">
        import { initializeImageMagick, ImageMagick, MagickFormat } from '@imagemagick/magick-wasm';

        const fileInput = document.getElementById('fileInput');
        const targetFormatSelect = document.getElementById('targetFormat');
        const convertBtn = document.getElementById('convertBtn');
        const statusDiv = document.getElementById('status');
        const downloadsContainer = document.getElementById('downloads-container');
        const previewContainer = document.getElementById('preview-container');
        const fileStatusText = document.getElementById('fileStatusText');

        let isEngineReady = false;
        let selectedFiles = []; // Maintain our own list of files

        // 1. Fetch our comprehensive JSON database to populate dropdown and input filter
        async function loadFormats() {
            try {
                const response = await fetch('format_database.json');
                if (!response.ok) throw new Error("Network response was not ok");
                const db = await response.json();

                targetFormatSelect.innerHTML = '';

                // Get unique formats
                const validOutputs = [...new Set(db.filter(f => f.can_write).map(f => f.extension.toLowerCase()))].sort();
                const validInputs = [...new Set(db.filter(f => f.can_read).map(f => `.${f.extension.toLowerCase()}`))];

                // Restrict input file picker
                if (validInputs.length > 0) {
                    fileInput.accept = validInputs.join(',');
                }

                validOutputs.forEach(ext => {
                    const option = document.createElement('option');
                    option.value = ext;
                    option.textContent = ext.toUpperCase();
                    targetFormatSelect.appendChild(option);
                });

                targetFormatSelect.value = 'png'; // default
            } catch (err) {
                statusDiv.textContent = "Failed to load format database. Defaulting to basic formats.";
                targetFormatSelect.innerHTML = `
                    <option value="png">PNG</option>
                    <option value="jpg">JPG</option>
                    <option value="webp">WEBP</option>
                    <option value="pdf">PDF</option>
                `;
                fileInput.accept = ".png,.jpg,.jpeg,.webp,.pdf";
            }
        }

        // Handle file selection
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                // Add new files to our array
                selectedFiles = selectedFiles.concat(Array.from(e.target.files));
                renderPreviews();
            }
            // Clear input so selecting the same file again triggers change event
            fileInput.value = '';
        });

        // Render thumbnails
        function renderPreviews() {
            previewContainer.innerHTML = '';

            if (selectedFiles.length === 0) {
                fileStatusText.textContent = "No file chosen";
            } else if (selectedFiles.length === 1) {
                fileStatusText.textContent = selectedFiles[0].name;
            } else {
                fileStatusText.textContent = `${selectedFiles.length} files selected`;
            }

            selectedFiles.forEach((file, index) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'thumbnail-wrapper';
                wrapper.title = file.name;

                // Create remove button
                const removeBtn = document.createElement('button');
                removeBtn.className = 'remove-btn';
                removeBtn.innerHTML = '&times;';
                removeBtn.onclick = () => {
                    selectedFiles.splice(index, 1);
                    renderPreviews();
                };

                // Create image preview
                const img = document.createElement('img');
                img.className = 'thumbnail-img';

                // If it's a standard web image, browsers can render it natively
                if (file.type.startsWith('image/') && !file.name.toLowerCase().endsWith('.heic')) {
                    img.src = URL.createObjectURL(file);
                    img.onload = () => URL.revokeObjectURL(img.src); // Free memory
                } else {
                    // Fallback for RAW/HEIC that browsers can't render natively
                    img.src = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><rect width="100" height="100" fill="%23ddd"/><text x="50" y="50" font-family="sans-serif" font-size="12" text-anchor="middle" dominant-baseline="middle" fill="%23666">RAW/Data</text></svg>';
                }

                wrapper.appendChild(img);
                wrapper.appendChild(removeBtn);

                // Overlay the name at the bottom
                const nameLabel = document.createElement('div');
                nameLabel.className = 'thumbnail-name';
                nameLabel.style.position = 'absolute';
                nameLabel.style.bottom = '0';
                nameLabel.style.width = '100%';
                nameLabel.style.background = 'rgba(255,255,255,0.8)';
                nameLabel.textContent = file.name.length > 12 ? file.name.substring(0, 10) + '...' : file.name;

                wrapper.appendChild(nameLabel);
                previewContainer.appendChild(wrapper);
            });
        }

        // 2. Initialize the WebAssembly Engine
        async function initWasm() {
            try {
                // Fetch the wasm file explicitly (use unpkg to ensure raw binary response)
                const wasmUrl = "https://unpkg.com/@imagemagick/magick-wasm@0.0.30/dist/magick.wasm";
                const response = await fetch(wasmUrl);
                const wasmBytes = new Uint8Array(await response.arrayBuffer());

                await initializeImageMagick(wasmBytes);

                isEngineReady = true;
                convertBtn.textContent = "Convert Image";
                convertBtn.disabled = false;
                statusDiv.textContent = "Engine Ready. Select a file to convert.";
            } catch (err) {
                console.error(err);
                statusDiv.textContent = "Failed to initialize ImageMagick WASM engine.";
            }
        }

        // 3. Conversion Logic
        convertBtn.addEventListener('click', async () => {
            if (selectedFiles.length === 0) {
                alert("Please select files first.");
                return;
            }

            const files = [...selectedFiles];
            const targetExt = targetFormatSelect.value;
            const isBatch = files.length > 1;

            convertBtn.disabled = true;
            downloadsContainer.innerHTML = ''; // clear previous links

            let successCount = 0;
            let failCount = 0;
            const zip = new JSZip();

            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                statusDiv.textContent = `Processing file ${i + 1} of ${files.length}: ${file.name}...`;

                try {
                    const arrayBuffer = await file.arrayBuffer();
                    const sourceBytes = new Uint8Array(arrayBuffer);

                    // Await a Promise that resolves when the setTimeout for this image finishes
                    await new Promise((resolve) => {
                        setTimeout(() => {
                            try {
                                ImageMagick.read(sourceBytes, (image) => {
                                    if (targetExt === 'jpg' || targetExt === 'jpeg') {
                                        image.hasAlpha = false;
                                    }

                                    // Title Case for enum
                                    const titleCaseFormat = targetExt.charAt(0).toUpperCase() + targetExt.slice(1).toLowerCase();
                                    const formatEnum = MagickFormat[titleCaseFormat] || targetExt.toUpperCase();

                                    image.write(formatEnum, (data) => {
                                        let originalName = file.name.split('.').slice(0, -1).join('.');
                                        if (!originalName) originalName = "image"; // fallback if no extension
                                        const outFileName = `${originalName}.${targetExt}`;

                                        if (isBatch) {
                                            // Add to zip
                                            // CRITICAL: Must clone the Uint8Array because 'data' is a view into
                                            // WebAssembly memory which will be overwritten by the next image processing.
                                            zip.file(outFileName, new Uint8Array(data));
                                        } else {
                                            // Single file, provide direct link
                                            const blob = new Blob([data], { type: 'application/octet-stream' });
                                            const url = URL.createObjectURL(blob);
                                            const dlLink = document.createElement('a');
                                            dlLink.href = url;
                                            dlLink.download = outFileName;
                                            dlLink.textContent = `⬇️ Download ${outFileName}`;
                                            dlLink.style.fontWeight = 'bold';
                                            dlLink.style.color = '#10b981';
                                            downloadsContainer.appendChild(dlLink);
                                        }
                                        successCount++;
                                    });
                                });
                            } catch(err) {
                                console.error(`Error processing ${file.name}:`, err);
                                failCount++;
                            }
                            resolve();
                        }, 50);
                    });
                } catch (err) {
                    console.error(`Error reading ${file.name}:`, err);
                    failCount++;
                }
            }

            if (isBatch && successCount > 0) {
                statusDiv.textContent = `Compressing ${successCount} files into ZIP...`;

                try {
                    const content = await zip.generateAsync({ type: "blob" });
                    const url = URL.createObjectURL(content);
                    const dlLink = document.createElement('a');
                    dlLink.href = url;
                    dlLink.download = `converted_images.zip`;
                    dlLink.textContent = `📦 Download All as ZIP (${successCount} files)`;
                    dlLink.style.fontWeight = 'bold';
                    dlLink.style.color = '#10b981';
                    downloadsContainer.appendChild(dlLink);
                } catch (err) {
                    console.error("ZIP Generation Failed:", err);
                    failCount += successCount; // Consider it a failure if we can't zip
                }
            }

            statusDiv.textContent = `Job complete! Successfully processed ${successCount} files. Failed: ${failCount}.`;
            convertBtn.disabled = false;
        });

        // Bootstrap
        loadFormats();
        initWasm();
    </script>
</body>
</html>
